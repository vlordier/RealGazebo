name: protocol-tools

on:
  pull_request:
    paths:
      - 'tools/**'
      - 'Source/**'
      - '.github/workflows/**'
      - 'pyproject.toml'
      - '.clang-format'
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'Source/**'
      - '.github/workflows/**'
      - 'pyproject.toml'
      - '.clang-format'

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile Python tooling
        run: python -m compileall -q tools
      - name: Unit tests
        run: python -m unittest discover -v -s tools -p 'test_*.py'
      - name: ArduPilot protocol tests
        working-directory: tools/ardupilot
        run: python -m unittest discover -v -p 'test_*.py'

  changed-file-quality:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install linters
        run: |
          python -m pip install --disable-pip-version-check 'ruff==0.15.12'
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck clang-format
      - name: Lint changed Python files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- '*.py')
          if ((${#files[@]})); then
            ruff check --output-format concise "${files[@]}"
            ruff format --check "${files[@]}"
          fi
      - name: Lint changed shell scripts
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- '*.sh')
          if ((${#files[@]})); then
            for file in "${files[@]}"; do bash -n "$file"; done
            shellcheck -x --format=gcc "${files[@]}"
          fi
      - name: Format-check changed C++ files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- 'Source/**/*.cpp' 'Source/**/*.h')
          if ((${#files[@]})); then
            clang-format --dry-run --Werror "${files[@]}"
          fi

  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest
      - name: Validate this workflow
        run: "$(go env GOPATH)/bin/actionlint .github/workflows/protocol-tools.yml"

  legacy-quality-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install audit tools
        run: |
          python -m pip install --disable-pip-version-check 'ruff==0.15.12'
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
      - name: Ruff full-repo tooling audit
        run: ruff check --output-format concise tools
      - name: ShellCheck full-repo tooling audit
        if: always()
        run: find tools -name '*.sh' -print0 | xargs -0 shellcheck -x --format=gcc
