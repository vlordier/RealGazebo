name: protocol-tools

on:
  pull_request:
    paths:
      - 'tools/**'
      - 'Source/RealGazeboStreaming/**'
      - 'Content/Maps/**'
      - 'pyproject.toml'
      - '.clang-format'
      - '.github/workflows/protocol-tools.yml'
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'Source/RealGazeboStreaming/**'
      - 'Content/Maps/**'
      - 'pyproject.toml'
      - '.clang-format'
      - '.github/workflows/protocol-tools.yml'

jobs:
  python-protocol-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check 'Pillow==11.3.0'
      - name: Compile Python tooling
        run: python -m compileall -q tools
      - name: Shell syntax
        run: find tools -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: RealGazebo UDP protocol tests
        working-directory: tools/ardupilot
        run: python -m unittest -v test_realgazebo_udp.py
      - name: Streaming and STANAG contract tests
        working-directory: tools
        run: python -m unittest -v test_streaming_coordinates.py test_validate_stanag_udp.py test_stanag_source_contract.py
      - name: World and render regression tests
        working-directory: tools/world_validation
        run: python -m unittest discover -v -p 'test_*.py'
      - name: Canonical Unreal maps exist
        run: |
          test -f Content/Maps/RealGazebo.umap
          test -f Content/Maps/RealGazeboBridge.umap

  lint-maintained-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install quality tools
        run: |
          python -m pip install --disable-pip-version-check 'ruff==0.12.7'
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
      - name: Ruff lint
        run: |
          ruff check tools/world_validation tools/test_*.py tools/validate_stanag_udp.py tools/ardupilot/realgazebo_udp.py tools/ardupilot/test_realgazebo_udp.py
      - name: Ruff format
        run: |
          ruff format --check tools/world_validation tools/test_*.py tools/validate_stanag_udp.py tools/ardupilot/realgazebo_udp.py tools/ardupilot/test_realgazebo_udp.py
      - name: ShellCheck errors
        run: find tools -name '*.sh' -print0 | xargs -0 shellcheck -S error
