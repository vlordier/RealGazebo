name: protocol-tools

on:
  pull_request:
    paths:
      - 'tools/**'
      - 'Source/RealGazeboStreaming/**'
      - 'Content/Maps/**'
      - '.github/workflows/protocol-tools.yml'
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'Source/RealGazeboStreaming/**'
      - 'Content/Maps/**'
      - '.github/workflows/protocol-tools.yml'

jobs:
  python-protocol-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile Python tooling
        run: python -m compileall -q tools
      - name: Shell syntax
        run: find tools -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: RealGazebo UDP protocol tests
        working-directory: tools/ardupilot
        run: python -m unittest -v test_realgazebo_udp.py
      - name: Streaming coordinate convention tests
        run: python -m unittest -v tools/test_streaming_coordinates.py
      - name: World audit report tests
        working-directory: tools/world_validation
        run: python -m unittest -v test_validate_world_report.py
      - name: Canonical Unreal maps exist
        run: |
          test -f Content/Maps/RealGazebo.umap
          test -f Content/Maps/RealGazeboBridge.umap
